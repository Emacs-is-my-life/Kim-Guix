# Use modern GPU-accelerated video output
vo=gpu-next

# Force hardware decoding via Intel's modern API
hwdec=vaapi

# Synchronize video to your monitor's refresh rate to eliminate tearing
video-sync=display-resample

# Upscaling/Downscaling
interpolation=yes
dscale=mitchell
cscale=spline36
tscale=oversample

# Ensure mpv respects X11 & picom
x11-bypass-compositor=no

# Prevent high-res videos from opening larger than your screen
autofit-larger=80%x80%
keepaspect=yes

# Default audio volume
volume=50

